name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/marcarinivinicius/conexao-solidaria-campaign-api
  APP_NAME: campaign-api

jobs:
  # Build + testes rodam sempre (push em main, PR, ou push de tag).
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Autenticar no feed do GitHub Packages
        run: |
          dotnet nuget update source conexaoSolidaria \
            --username marcarinivinicius \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal"

  # Builda e publica imagem em TODO push na main ou de tag - nenhuma em PR
  # (obrigatorio pelo enunciado do hackathon: "a geracao da imagem no CI e
  # obrigatoria" a cada push na branch principal). Push comum na main leva
  # a tag "main-<sha curto>" (nunca "latest" - imagem sem versao rastreavel
  # nao serve pra debugar depois); push de tag de versao (ex.: v1.2.3) usa
  # a propria tag. So a segunda forma dispara o job de deploy abaixo.
  publish-image:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Determinar tag da imagem
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=main-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
          secrets: |
            nuget_token=${{ secrets.GITHUB_TOKEN }}

  # Abre um PR em conexao-solidaria-infra bumpando a tag da imagem
  # (cluster/apps/services/campaign-api/kustomization.yaml). O ArgoCD
  # sincroniza depois que esse PR for mergeado - ver conexao-solidaria-infra/README.md.
  # So roda pra push de tag de versao - push comum na main so gera a imagem
  # acima, sem abrir PR de deploy (fluxo de release continua manual/por tag).
  deploy:
    runs-on: ubuntu-latest
    needs: publish-image
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Clone repo infra
        run: |
          git clone https://x-access-token:${{ secrets.INFRA_REPO_TOKEN }}@github.com/marcarinivinicius/conexao-solidaria-infra.git infra-repo
          cd infra-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Instalar kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Atualizar tag da imagem
        run: |
          cd infra-repo/cluster/apps/services/${{ env.APP_NAME }}
          kustomize edit set image "${{ env.IMAGE }}=${{ env.IMAGE }}:${{ needs.publish-image.outputs.image_tag }}"
          cat kustomization.yaml

      - name: Criar branch e abrir PR
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          cd infra-repo
          DEPLOY_BRANCH="deploy/${{ env.APP_NAME }}-${{ needs.publish-image.outputs.image_tag }}"
          git checkout -b "$DEPLOY_BRANCH"
          git add "cluster/apps/services/${{ env.APP_NAME }}/"

          COMMIT_MSG="deploy(${{ env.APP_NAME }}): ${{ needs.publish-image.outputs.image_tag }}"
          git commit -m "$COMMIT_MSG"
          git push origin "$DEPLOY_BRANCH"

          gh pr create \
            --repo marcarinivinicius/conexao-solidaria-infra \
            --title "$COMMIT_MSG" \
            --body "Imagem: \`${{ env.IMAGE }}:${{ needs.publish-image.outputs.image_tag }}\`
            Origem: ${{ github.repository }}@${{ github.sha }}

            Após o merge, o ArgoCD sincroniza e o Argo Rollouts promove em canary." \
            --base main \
            --head "$DEPLOY_BRANCH"
